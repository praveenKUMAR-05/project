<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Fool 😜</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: pop 0.6s ease;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  h1 {
    font-size: 2.5rem;
    color: #ff4e50;
  }

  p {
    font-size: 1.2rem;
    margin-top: 10px;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4e50;
    color: white;
    cursor: pointer;
    font-size: 1rem;
  }

  button:hover {
    background: #ff2e30;
  }
</style>
</head>
<body>

<div class="card">
  <h1>😂 April Fool!</h1>
  <p>You really scanned this QR <src:"https://www.shutterstock.com/search/joker-face-funny?image_type=illustration"></p>
  <button onclick="prank()">Click Me</button>
</div>

<script>
function prank() {
  alert("Gotcha again 🤣 Happy April Fool!");
}
</script>

</body>
</html>
