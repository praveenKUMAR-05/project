<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Fool 😜</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  }

  .card {
    background: white;
    padding: 60px; /* increased padding */
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    animation: pop 0.6s ease;
    width: 90%;
    max-width: 500px; /* bigger width */
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  h1 {
    font-size: 3rem; /* bigger text */
    color: #ff4e50;
    margin-bottom: 10px;
  }

  p {
    font-size: 1.4rem;
    margin-top: 10px;
  }

  button {
    margin-top: 30px;
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    background: #ff4e50;
    color: white;
    cursor: pointer;
    font-size: 1.2rem;
    transition: 0.3s;
  }

  button:hover {
    background: #ff2e30;
    transform: scale(1.05);
  }

  img {
    display: block;
    margin: 20px auto 0;
    max-width: 120px; /* control image size */
  }
</style>
</head>
<body>

<div class="card">
  <h1>😂 April Fool!</h1>
  <p>You really scanned this QR 😜</p>
  <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/... (keep your full base64 here) ..." />
  <button onclick="prank()">Click Me</button>
</div>

<script>
function prank() {
  alert("Gotcha again 🤣 Happy April Fool!");
}
</script>

</body>
</html>
